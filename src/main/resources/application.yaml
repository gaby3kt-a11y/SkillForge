spring:
  application:
    name: skillforge

  datasource:
    url: jdbc:postgresql://localhost:5432/skillforge
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migrations

  cache:
    type: caffeine
    cache-names:
      - courses
      - users
      - enrollments
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.skillforge: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000} # ms (24 hours)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # ms (7 days)

app:
  frontend-url: http://localhost:3000
  max-courses-per-user: 10
  course-access-days: 180
  support-email: ${SUPPORT_EMAIL:support@skillforge.com}

# MapStruct configuration
mapstruct:
  # Force MapStruct to generate code even if there are unmapped properties
  unmapped-target-policy: IGNORE

  # Disable Lombok integration if issues occur
  Lombok:
    required: false